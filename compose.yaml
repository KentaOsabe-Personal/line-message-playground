services:
  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_ALLOWED_HOST: ${NGROK_DOMAIN:-}
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local-development-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-line_message}
      MYSQL_USER: ${MYSQL_USER:-line_message}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-line_message_password}
      LINE_CHANNEL_CREDENTIAL_KEYS: ${LINE_CHANNEL_CREDENTIAL_KEYS:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      LINE_USER_ID: ${LINE_USER_ID}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    command:
      - --general-log=OFF
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-line_message}
      MYSQL_USER: ${MYSQL_USER:-line_message}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-line_message_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  ngrok:
    image: ngrok/ngrok:3.39.9-alpine
    command:
      - http
      - --url=https://${NGROK_DOMAIN:-}
      - http://frontend:5173
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "127.0.0.1:4040:4040"
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  mysql_data:
